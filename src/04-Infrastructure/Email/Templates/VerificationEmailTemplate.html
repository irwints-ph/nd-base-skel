<!-- Contracts/Templates/Emails/VerificationEmailTemplate.html -->
<html>
  <body style="font-family: Arial, sans-serif; color: #333;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table width="600" style="border:1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            <tr style="background-color: #0d6efd; color: white;">
              <td style="padding: 20px; display: flex; align-items: center;">
                <img src="{{ logo_url }}" alt="Company Logo" style="height: 40px; margin-right: 12px;" />
                <h2 style="margin: 0; font-size: 20px;">CompanyName Verification</h2>
              </td>
            </tr>
            <tr>
              <td style="padding: 30px;">
                <p>Hi,</p>
                <p>Thank you for registering. Please confirm your email by clicking the button below:</p>
                <div style="text-align: center; margin: 30px 0;">
                  <a href="{{ verify_link }}" 
                     style="background-color: #0d6efd; color: white; text-decoration: none; padding: 12px 24px; border-radius: 4px; font-weight: bold;">
                    Verify Email
                  </a>
                </div>
                <p>If the button doesn’t work, you can also verify your email by visiting this link:</p>
                <p><a href="{{ verify_link }}">{{ verify_link }}</a></p>
              </td>
            </tr>
            <tr style="background-color: #f8f9fa;">
              <td style="padding: 20px; text-align: center; font-size: 12px; color: #888;">
                &copy; {{ year }} CompanyName. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
