services:
  postgres:
    image: postgres:15
    container_name: sample-app-postgres
    environment:
      POSTGRES_DB: sample-app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sample-app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    shm_size: 256m   # ✅ add this line

volumes:
  postgres_data:
    driver: local

networks:
  sample-app-network:
    driver: bridge